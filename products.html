<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iconic-Shop | Products</title>
    <link rel="icon" href="./Y.png" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css"
      rel="stylesheet"
    />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
    <script src="https://unpkg.com/flowbite@latest/dist/flowbite.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
      .smart-card {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        object-fit: cover;
      }
      .smart-card:hover {
        transform: translateY(-0.25rem);
        box-shadow:
          0 10px 25px -5px rgba(59, 130, 246, 0.2),
          0 8px 10px -6px rgba(59, 130, 246, 0.1);
      }

      .smart-card:hover img {
        transform: scale(1.05);
        transition: transform 0.5s;
        object-fit: cover;
      }
    </style>
  </head>
  <body class="bg-gray-900 text-gray-100 flex flex-col min-h-screen">
    <!-- Navbar -->
    <nav class="bg-neutral-primary relative w-full z-20 top-0 start-0">
      <div
        class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4"
      >
        <a
          href="index.html"
          class="text-3xl font-extrabold text-blue-400 tracking-wider"
          >Iconic
        </a>
        <button
          data-collapse-toggle="navbar-default"
          type="button"
          class="inline-flex items-center p-2 w-10 h-10 justify-center text-sm text-body rounded-base md:hidden hover:bg-neutral-secondary-soft hover:text-heading focus:outline-none focus:ring-2 focus:ring-neutral-tertiary"
          aria-controls="navbar-default"
          aria-expanded="false"
        >
          <span class="sr-only">Open main menu</span>
          <svg
            class="w-6 h-6"
            aria-hidden="true"
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            fill="none"
            viewBox="0 0 24 24"
          >
            <path
              stroke="currentColor"
              stroke-linecap="round"
              stroke-width="2"
              d="M5 7h14M5 12h14M5 17h14"
            />
          </svg>
        </button>
        <div class="hidden w-full md:block md:w-auto" id="navbar-default">
          <ul
            class="font-medium md:items-center flex flex-col p-4 md:p-0 mt-4 rounded-base bg-neutral-secondary-soft md:flex-row md:space-x-8 rtl:space-x-reverse md:mt-0 md:border-0 md:bg-neutral-primary"
          >
            <li>
              <a
                href="./index.html"
                class="block py-2 px-3 text-white bg-brand rounded md:bg-transparent md:text-fg-brand md:p-0"
                aria-current="page"
                >Home</a
              >
            </li>
            <li>
              <a
                href="./products.html"
                class="block py-2 px-3 text-heading rounded hover:bg-neutral-tertiary md:hover:bg-transparent md:border-0 md:hover:text-fg-brand md:p-0 md:dark:hover:bg-transparent"
                >Products</a
              >
            </li>
            <li>
              <a
                href="#"
                title="Open Cart"
                class="cart-drawer-btn block flex gap-4 py-2 px-3 text-heading rounded hover:bg-neutral-tertiary md:hover:bg-transparent md:border-0 md:hover:text-fg-brand md:p-0 md:dark:hover:bg-transparent"
              >
                Cart<button
                  class="relative text-gray-300 hover:text-blue-400 transition-colors block sm:inline-block outline-none group"
                >
                  <i
                    class="fas fa-shopping-cart text-xl group-hover:scale-110 transition-transform font-[40px]"
                  ></i>
                  <span
                    class="cart-count absolute bottom-2 left-3 bg-blue-600 text-white text-[5px] font-bold px-1.5 py-0.5 rounded-full shadow-md"
                    >0</span
                  >
                </button>
              </a>
            </li>
            <li>
              <a
                href="login.html"
                class="inline-block px-5 py-2.5 bg-blue-600 hover:bg-blue-500 rounded-lg text-white shadow-lg shadow-blue-500/30 transition-all font-semibold text-center w-full sm:w-auto mt-2 sm:mt-0"
                >Login</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="container mx-auto px-6 md:px-12 lg:px-24 py-10 flex-grow">
      <div
        class="flex flex-col sm:flex-row justify-between items-center border-b border-gray-700 pb-4 mb-8"
      >
        <h1 class="text-3xl font-bold text-white tracking-tight">
          All Products
        </h1>
        <div class="mt-4 sm:mt-0 relative">
          <select
            class="select-sort bg-gray-800 border border-gray-600 text-gray-300 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 outline-none hover:bg-gray-700 transition"
          >
            <option selected>Sort by: Popularity</option>
            <option value="1">Price: Low to High</option>
            <option value="2">Price: High to Low</option>
          </select>
        </div>
      </div>

      <!-- Products Grid (4 cols on xl, 3 on lg, 2 on md) -->
      <div
        data-aos="fade-up"
        data-aos-delay="200"
        class="show-products grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"
      >
        <!-- Product Cards -->
      </div>
    </main>
    <!-- Footer -->
    <footer
      class="bg-gray-800 mt-auto shadow-inner border-t border-gray-700 relative z-20"
    >
      <div
        class="container mx-auto px-6 md:px-12 lg:px-24 py-8 flex flex-col md:flex-row justify-between items-center text-gray-400 text-sm"
      >
        <p>&copy; 2026 Iconic-Shop. All rights reserved.</p>
        <div class="flex space-x-5 mt-4 md:mt-0">
          <a
            href="https://www.facebook.com/yousef.farouk.372/"
            target="_blank"
            class="text-gray-400 hover:text-blue-500 transition-all hover:scale-110"
            title="Facebook"
          >
            <i class="fab fa-facebook-f text-lg"></i>
          </a>
          <a
            href="https://www.instagram.com/iconic.farouk/?hl=en"
            target="_blank"
            class="text-gray-400 hover:text-pink-500 transition-all hover:scale-110"
            title="Instagram"
          >
            <i class="fab fa-instagram text-lg"></i>
          </a>

          <a
            href="https://www.linkedin.com/in/yousef-farouk-dev/"
            target="_blank"
            class="text-gray-400 hover:text-blue-700 transition-all hover:scale-110"
            title="LinkedIn"
          >
            <i class="fab fa-linkedin-in text-lg"></i>
          </a>
        </div>
        <div class="mt-4 md:mt-0 space-x-4 pr-1">
          <a
            href="https://wa.me/201119166590"
            target="_blank"
            class="hover:text-white transition-colors relative z-20"
            >Contact Whatsapp</a
          >
          <a href="#" class="hover:text-white transition-colors relative z-20"
            >Privacy Policy</a
          >
          <a href="#" class="hover:text-white transition-colors relative z-20"
            >Terms of Service</a
          >
        </div>
      </div>
    </footer>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
      AOS.init({
        duration: 800,
        once: false,
        offset: 100,
      });
      window.addEventListener("load", () => {
        AOS.refreshHard();
      });
    </script>
    <script src="./cart.js"></script>
    <script src="./main.js"></script>
  </body>
</html>
