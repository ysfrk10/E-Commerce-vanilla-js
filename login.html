<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iconic-Shop | Login</title>
    <link rel="icon" href="/Y.png" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body
    class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center p-4"
  >
    <div
      class="bg-gray-800 p-8 sm:p-10 rounded-xl shadow-2xl border border-gray-700 w-full max-w-md"
    >
      <div class="text-center mb-8">
        <h1 class="text-4xl font-extrabold text-blue-400 mb-2 tracking-tight">
          Iconic-Shop
        </h1>
        <p class="text-gray-400">Welcome back! Please login to your account.</p>
      </div>

      <form action="index.html">
        <div class="mb-5">
          <label
            for="email"
            class="block text-sm font-medium text-gray-300 mb-2"
            >Email Address</label
          >
          <div class="relative">
            <svg
              class="w-5 h-5 text-gray-500 absolute top-3 left-3"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"
              ></path>
            </svg>
            <input
              type="email"
              id="email"
              class="w-full bg-gray-900 border border-gray-600 rounded-lg pl-10 pr-4 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors"
              placeholder="you@example.com"
              required
            />
          </div>
        </div>

        <div class="mb-6">
          <div class="flex justify-between items-center mb-2">
            <label
              for="password"
              class="block text-sm font-medium text-gray-300"
              >Password</label
            >
            <a
              href="#"
              class="text-xs text-blue-400 hover:text-blue-300 transition-colors"
              >Forgot password?</a
            >
          </div>
          <div class="relative">
            <svg
              class="w-5 h-5 text-gray-500 absolute top-3 left-3"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
              ></path>
            </svg>
            <input
              type="password"
              id="password"
              class="w-full bg-gray-900 border border-gray-600 rounded-lg pl-10 pr-4 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors"
              placeholder="••••••••"
              required
            />
          </div>
        </div>

        <div class="flex items-center mb-6">
          <input
            type="checkbox"
            id="remember"
            class="w-4 h-4 text-blue-600 bg-gray-900 border-gray-600 rounded focus:ring-blue-500 focus:ring-offset-gray-800"
          />
          <label for="remember" class="ml-2 text-sm text-gray-400"
            >Remember me</label
          >
        </div>

        <button
          type="submit"
          class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 px-4 rounded-lg transition-transform transform hover:-translate-y-0.5 shadow-lg flex justify-center items-center"
        >
          Sign In
        </button>

        <div class="mt-6 text-center">
          <span class="text-gray-500 text-sm">Don't have an account? </span>
          <a
            href="#"
            class="text-sm text-blue-400 hover:text-blue-300 font-medium transition-colors"
            >Sign up</a
          >
        </div>

        <div class="mt-4 text-center border-t border-gray-700 pt-4">
          <a
            href="index.html"
            class="text-sm text-gray-400 hover:text-white transition-colors"
            >&larr; Back to Home</a
          >
        </div>
      </form>
    </div>
  </body>
</html>
